<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iris: Perspective Swap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 280px;
      padding: 24px;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e4e4e7;
    }
    .popup-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .popup-header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fafafa;
      letter-spacing: -0.02em;
    }
    .popup-header p {
      font-size: 12px;
      color: #71717a;
      margin-top: 4px;
    }
    .open-iris-btn {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #27272a 0%, #18181b 100%);
      border: 1px solid #3f3f46;
      border-radius: 10px;
      color: #fafafa;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .open-iris-btn:hover {
      background: linear-gradient(135deg, #3f3f46 0%, #27272a 100%);
      border-color: #52525b;
    }
    .open-iris-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <h1>Iris: Perspective Swap</h1>
    <p>Swap your feed with the world</p>
  </div>
  <button class="open-iris-btn" id="openIrisBtn">Open Iris</button>
  <script src="popup.js"></script>
</body>
</html>
